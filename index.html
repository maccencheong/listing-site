<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Property Listings</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
}

.card{
background:#222;
border-radius:8px;
overflow:hidden;
text-decoration:none;
color:white;
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.cardInfo{
padding:10px;
}

.price{
font-size:18px;
font-weight:bold;
}

</style>

</head>

<body>

<h2>Property Listings</h2>

<div id="listings" class="grid"></div>

<script>

const API="https://script.google.com/macros/s/AKfycbzwfYqX3ks4bFt4a11ZDGb8DWIgGMCC0JHS3t5bWZFYMhejGz6xsdGE7xg0gBI3P8qhXA/exec?mode=list"

function formatPrice(p){

p=p.toUpperCase()

let num=parseFloat(p)

if(p.includes("K")) num*=1000
if(p.includes("M")) num*=1000000

return "RM"+num.toLocaleString()

}

function parseListing(n){

const parts=n.split("_")

let price=""

parts.forEach(p=>{
if(p.includes("K")||p.includes("M"))
price=formatPrice(p)
})

return {price}

}

fetch(API)

.then(r=>r.json())

.then(data=>{

const container=document.getElementById("listings")

data.forEach(item=>{

const parsed=parseListing(item.name)

const card=document.createElement("a")

card.className="card"

card.href="listing.html?id="+item.id

card.innerHTML=`

<img src="${item.cover}">

<div class="cardInfo">
<div class="price">${parsed.price}</div>
</div>

`

container.appendChild(card)

})

})

</script>

</body>
</html>
