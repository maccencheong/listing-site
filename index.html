<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Property Listings</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
padding:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
gap:20px;
}

.card{
background:#222;
border-radius:10px;
overflow:hidden;
text-decoration:none;
color:white;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.cardInfo{
padding:15px;
}

.price{
font-size:22px;
font-weight:bold;
}

.info{
opacity:0.7;
font-size:14px;
margin-top:5px;
}

</style>

</head>

<body>

<h2>Property Listings</h2>

<div id="listings" class="grid">Loading...</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzwfYqX3ks4bFt4a11ZDGb8DWIgGMCC0JHS3t5bWZFYMhejGz6xsdGE7xg0gBI3P8qhXA/exec"

function parseListing(n){

const parts=n.split("_")

return{
price:parts[0]||"",
info:parts.slice(1).join(" • ")
}

}

fetch(API)

.then(r=>r.json())

.then(data=>{

const container=document.getElementById("listings")

container.innerHTML=""

data.forEach(item=>{

const parsed=parseListing(item.name)

const card=document.createElement("a")

card.className="card"

card.href="listing.html?data="+encodeURIComponent(JSON.stringify(item))

card.innerHTML=`

<img src="${item.photos[0]||""}">

<div class="cardInfo">

<div class="price">${parsed.price}</div>

<div class="info">${parsed.info}</div>

</div>

`

container.appendChild(card)

})

})

.catch(err=>{

document.getElementById("listings").innerHTML="Error loading listings"

console.log(err)

})

</script>

</body>

</html>
