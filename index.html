<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Property Listings</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:40px;
}

h1{
margin-bottom:30px;
}

.card{
display:block;
background:white;
padding:20px;
margin-bottom:15px;
border-radius:10px;
text-decoration:none;
color:black;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.card:hover{
background:#f9f9f9;
}

</style>

</head>

<body>

<h1>Property Listings</h1>

<div id="listings">Loading listings...</div>

<script>

const API = "https://script.google.com/macros/s/https://https://script.google.com/macros/s/AKfycbwNzDUVNkVZed_AiNsJuFGR4nT8MJD4PbFHzzOqyR1x/dev"

fetch(API)

.then(response => response.json())

.then(data => {

const container = document.getElementById("listings")

container.innerHTML = ""

data.forEach(item => {

const card = document.createElement("a")

card.href = "listing.html?name=" + encodeURIComponent(item.name)

card.className = "card"

card.innerText = item.name

container.appendChild(card)

})

})

.catch(error => {

document.getElementById("listings").innerHTML = "Error loading listings"

console.error(error)

})

</script>

</body>

</html>
