<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Property Listings</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-body{
padding:15px;
}

.price{
color:#d62828;
font-size:20px;
font-weight:bold;
}

</style>

</head>

<body>

<h1>Property Listings</h1>

<div id="listings" class="grid"></div>

<script src="script.js"></script>

</body>

</html>
