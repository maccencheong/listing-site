<script>

const API="https://script.google.com/macros/s/AKfycbzwfYqX3ks4bFt4a11ZDGb8DWIgGMCC0JHS3t5bWZFYMhejGz6xsdGE7xg0gBI3P8qhXA/exec"

fetch(API)
.then(r=>r.json())
.then(data=>{

const container=document.getElementById("listings")

data.forEach(item=>{

const card=document.createElement("a")

card.href="listing.html?name="+item.name

card.className="card"

card.innerText=item.name

container.appendChild(card)

})

})

</script>
