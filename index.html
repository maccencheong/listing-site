<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Property Listings</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
}

.card{
background:#222;
border-radius:8px;
overflow:hidden;
text-decoration:none;
color:white;
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.price{
padding:10px;
font-weight:bold;
}

</style>

</head>

<body>

<h2>Property Listings</h2>

<div id="listings" class="grid"></div>

<script>

fetch("listings.json")
.then(r=>r.json())
.then(data=>{

const container=document.getElementById("listings")

data.forEach(item=>{

container.innerHTML+=`

<a class="card" href="listing.html?id=${item.id}">

<img src="${item.cover}" loading="lazy">

<div class="price">${item.name}</div>

</a>

`

})

})

</script>

</body>
</html>
