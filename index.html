<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Property Listings</title>
<style>
body{
font-family:Arial;
padding:40px;
background:#f5f5f5;
}
a{
display:block;
padding:15px;
margin:10px 0;
background:white;
text-decoration:none;
color:black;
border-radius:8px;
}
</style>
</head>

<body>

<h1>Property Listings</h1>

<div id="listings"></div>

<script>

const listings = [
"RM470k_1Sty_3R2B_1000sf_TK5",
"RM820k_2Sty_4R3B_1800sf_Subang"
]

const container = document.getElementById("listings")

listings.forEach(name=>{
const link = document.createElement("a")
link.href = "./listing.html?name="+name
link.innerText = name
container.appendChild(link)
})

</script>

</body>
</html>
