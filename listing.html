<script>

const id=new URLSearchParams(location.search).get("id")

let photos=[]
let index=0

fetch("listings.json")
.then(r=>r.json())
.then(data=>{

const listing=data.find(x=>x.id==id)

if(!listing){

alert("Listing not found")

return

}

photos=listing.photos

if(!photos || photos.length===0){

document.getElementById("photo").src=listing.cover
return

}

index=0

show()

})

function show(){

document.getElementById("photo").src=photos[index]

}

function next(){

if(photos.length===0) return

index++

if(index>=photos.length){

index=0

}

show()

}

function prev(){

if(photos.length===0) return

index--

if(index<0){

index=photos.length-1

}

show()

}

function goBack(){

window.location.href="index.html"

}

function copyLink(){

navigator.clipboard.writeText(window.location.href)

alert("Listing link copied")

}

</script>
