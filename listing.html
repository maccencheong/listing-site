<script>

const API="https://script.google.com/macros/s/AKfycbzwfYqX3ks4bFt4a11ZDGb8DWIgGMCC0JHS3t5bWZFYMhejGz6xsdGE7xg0gBI3P8qhXA/exec"

const params=new URLSearchParams(window.location.search)
const name=params.get("name")

document.getElementById("title").innerText=name

fetch(API)
.then(r=>r.json())
.then(data=>{

const listing=data.find(l=>l.name===name)

const gallery=document.getElementById("gallery")

listing.photos.forEach(src=>{

gallery.innerHTML+=`
<div class="swiper-slide">
<img src="${src}">
</div>
`

})

new Swiper('.swiper',{loop:true})

if(listing.video){

const btn=document.getElementById("videoBtn")
btn.style.display="block"
btn.href=listing.video

}

})

</script>
