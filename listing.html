<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Listing</title>

<style>

body{
margin:0;
background:black;
}

.gallery{
display:flex;
overflow-x:auto;
scroll-snap-type:x mandatory;
}

.gallery img{
width:100%;
flex:0 0 100%;
scroll-snap-align:center;
}

</style>

</head>

<body>

<div class="gallery" id="gallery"></div>

<script>

const id=new URLSearchParams(location.search).get("id")

fetch("listings.json")
.then(r=>r.json())
.then(data=>{

const listing=data.find(x=>x.id==id)

const g=document.getElementById("gallery")

listing.photos.forEach(p=>{
g.innerHTML+=`<img src="${p}" loading="lazy">`
})

})

</script>

</body>
</html>
