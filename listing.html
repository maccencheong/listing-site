<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Property</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/swiper/swiper-bundle.min.css"/>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
}

.header{
padding:20px;
}

.price{
font-size:30px;
font-weight:bold;
}

.info{
opacity:0.7;
margin-top:5px;
}

.swiper{
height:70vh;
}

.swiper-slide img{
width:100%;
height:100%;
object-fit:cover;
}

.videoBtn{
position:fixed;
bottom:30px;
right:30px;
background:red;
color:white;
padding:14px 22px;
border-radius:30px;
text-decoration:none;
display:none;
}

</style>

</head>

<body>

<div class="header">

<div class="price" id="price"></div>
<div class="info" id="info"></div>

</div>

<div class="swiper">

<div class="swiper-wrapper" id="gallery"></div>

</div>

<a id="videoBtn" class="videoBtn">▶ Watch Video</a>

<script src="https://cdn.jsdelivr.net/npm/swiper/swiper-bundle.min.js"></script>

<script>

const params = new URLSearchParams(window.location.search)

const data = JSON.parse(decodeURIComponent(params.get("data")))

function parseListing(n){

const parts = n.split("_")

return {

price: parts[0] || "",
info: parts.slice(1).join(" • ")

}

}

const parsed = parseListing(data.name)

document.getElementById("price").innerText = parsed.price
document.getElementById("info").innerText = parsed.info

const gallery = document.getElementById("gallery")

data.photos.forEach(src => {

gallery.innerHTML += `
<div class="swiper-slide">
<img loading="lazy" src="${src}">
</div>
`

})

new Swiper('.swiper',{loop:true})

if(data.video){

const btn=document.getElementById("videoBtn")

btn.style.display="block"

btn.href=data.video

}

</script>

</body>

</html>
